<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 640" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Inter,Roboto,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0a0f"/>
      <stop offset="1" stop-color="#13111c"/>
    </linearGradient>
    <linearGradient id="vault" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7c3aed"/>
      <stop offset="1" stop-color="#6d28d9"/>
    </linearGradient>
    <linearGradient id="node" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1e1b2e"/>
      <stop offset="1" stop-color="#16131f"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="7" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1000" height="640" rx="20" fill="url(#bg)"/>

  <!-- connecting lines (drawn first, behind nodes) -->
  <g stroke="#7c3aed" stroke-width="2.5" fill="none" opacity="0.55">
    <!-- vault to bus -->
    <path d="M500 168 L500 250"/>
    <!-- bus horizontal -->
    <path d="M210 295 L790 295" opacity="0.4"/>
    <!-- bus to three nodes -->
    <path d="M210 295 L210 360"/>
    <path d="M500 295 L500 360"/>
    <path d="M790 295 L790 360"/>
    <!-- nodes down to 'same brain' bus -->
    <path d="M210 470 L210 510 L790 510 L790 470" opacity="0.4"/>
    <path d="M500 470 L500 555" opacity="0.7"/>
  </g>

  <!-- animated pulse dots along sync paths -->
  <g fill="#a78bfa">
    <circle r="4" filter="url(#softglow)"><animateMotion dur="2.6s" repeatCount="indefinite" path="M500 168 L500 250"/></circle>
    <circle r="3.5" filter="url(#softglow)"><animateMotion dur="3.2s" repeatCount="indefinite" path="M500 295 L210 295 L210 360"/></circle>
    <circle r="3.5" filter="url(#softglow)"><animateMotion dur="3.2s" begin="1s" repeatCount="indefinite" path="M500 295 L790 295 L790 360"/></circle>
    <circle r="3.5" filter="url(#softglow)"><animateMotion dur="2.4s" begin="0.5s" repeatCount="indefinite" path="M500 295 L500 360"/></circle>
  </g>

  <!-- VAULT -->
  <g filter="url(#glow)">
    <rect x="270" y="70" width="460" height="98" rx="16" fill="url(#vault)"/>
  </g>
  <text x="500" y="112" text-anchor="middle" fill="#fff" font-size="26" font-weight="700" letter-spacing="1">OBSIDIAN VAULT</text>
  <text x="500" y="142" text-anchor="middle" fill="#e9d5ff" font-size="15">Markdown — the single source of truth</text>

  <!-- Git sync label -->
  <g>
    <rect x="442" y="198" width="116" height="32" rx="16" fill="#1e1b2e" stroke="#7c3aed" stroke-width="1.5"/>
    <text x="500" y="219" text-anchor="middle" fill="#c4b5fd" font-size="15" font-weight="600" letter-spacing="0.5">↕  Git sync</text>
  </g>

  <!-- THREE MACHINE NODES -->
  <!-- Laptop -->
  <g>
    <rect x="90" y="360" width="240" height="110" rx="14" fill="url(#node)" stroke="#7c3aed" stroke-width="1.5"/>
    <circle cx="168" cy="395" r="6" fill="#a78bfa"/>
    <text x="185" y="402" text-anchor="start" fill="#fff" font-size="22" font-weight="700">Laptop</text>
    <text x="210" y="432" text-anchor="middle" fill="#a78bfa" font-size="15">Claude Code</text>
    <text x="210" y="455" text-anchor="middle" fill="#6b7280" font-size="12.5">macOS</text>
  </g>
  <!-- Desktop -->
  <g>
    <rect x="380" y="360" width="240" height="110" rx="14" fill="url(#node)" stroke="#3b82f6" stroke-width="1.5"/>
    <circle cx="450" cy="395" r="6" fill="#60a5fa"/>
    <text x="467" y="402" text-anchor="start" fill="#fff" font-size="22" font-weight="700">Desktop</text>
    <text x="500" y="432" text-anchor="middle" fill="#60a5fa" font-size="15">Codex</text>
    <text x="500" y="455" text-anchor="middle" fill="#6b7280" font-size="12.5">Linux</text>
  </g>
  <!-- Server -->
  <g>
    <rect x="670" y="360" width="240" height="110" rx="14" fill="url(#node)" stroke="#10b981" stroke-width="1.5"/>
    <circle cx="748" cy="395" r="6" fill="#34d399"/>
    <text x="765" y="402" text-anchor="start" fill="#fff" font-size="22" font-weight="700">Server</text>
    <text x="790" y="432" text-anchor="middle" fill="#34d399" font-size="15">Cursor</text>
    <text x="790" y="455" text-anchor="middle" fill="#6b7280" font-size="12.5">headless</text>
  </g>

  <!-- 'all read the same brain' -->
  <text x="500" y="503" text-anchor="middle" fill="#9ca3af" font-size="14" font-style="italic">all read the same brain</text>

  <!-- punchline -->
  <g filter="url(#softglow)">
    <rect x="250" y="558" width="500" height="58" rx="14" fill="#13111c" stroke="#7c3aed" stroke-width="1.5"/>
  </g>
  <text x="500" y="582" text-anchor="middle" fill="#e9d5ff" font-size="15.5" font-weight="600">"I know who you are, what you're building,</text>
  <text x="500" y="603" text-anchor="middle" fill="#e9d5ff" font-size="15.5" font-weight="600">and where we left off."</text>
</svg>
